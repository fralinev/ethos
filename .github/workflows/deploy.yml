name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker build --platform linux/amd64 -f apps/api/Dockerfile -t ethos-api .
          docker tag ethos-api:latest 561058901080.dkr.ecr.us-east-1.amazonaws.com/ethos-api:latest
          docker push 561058901080.dkr.ecr.us-east-1.amazonaws.com/ethos-api:latest

      - name: Build and push Web image
        run: |
          docker build --platform linux/amd64 -f apps/web/Dockerfile -t ethos-web .
          docker tag ethos-web:latest 561058901080.dkr.ecr.us-east-1.amazonaws.com/ethos-web:latest
          docker push 561058901080.dkr.ecr.us-east-1.amazonaws.com/ethos-web:latest

      - name: Deploy API to ECS
        run: |
          aws ecs update-service \
            --cluster ethos \
            --service ethos-api \
            --task-definition ethos-api:5 \
            --force-new-deployment \
            --region us-east-1

      - name: Deploy Web to ECS
        run: |
          aws ecs update-service \
            --cluster ethos \
            --service ethos-web \
            --task-definition ethos-web:5 \
            --force-new-deployment \
            --region us-east-1
